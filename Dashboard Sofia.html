<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dashboard · Yoga Sofía Lira</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="styles.css?v=2" />

<style>
  /* host page */
  html, body { height: 100%; }
  body {
    background: #1B1410;
    background-image:
      radial-gradient(ellipse 70% 40% at 50% 10%, rgba(181, 86, 58, 0.16), transparent 60%),
      radial-gradient(ellipse 60% 35% at 50% 100%, rgba(110, 117, 73, 0.14), transparent 65%);
    min-height: 100vh;
    overflow: hidden;
  }
  #stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #root {
    transform-origin: center center;
  }
  /* Subtle device label */
  .device-label {
    position: fixed;
    top: 24px;
    left: 24px;
    color: rgba(245, 239, 230, 0.55);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 16px;
    letter-spacing: 0.02em;
  }
  .device-label .dot {
    display: inline-block;
    width: 5px; height: 5px; border-radius: 50%;
    background: #B5563A;
    margin-right: 8px;
    vertical-align: middle;
  }
  @media (max-width: 460px) {
    .device-label { display: none; }
  }
</style>
</head>
<body>

<div class="device-label">
  <span class="dot"></span>Dashboard · Sofía Lira
</div>

<div id="stage"><div id="root"></div></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Frame + Tweaks helpers -->
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- App parts -->
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="login.jsx"></script>
<script type="text/babel" src="home.jsx"></script>
<script type="text/babel" src="screen-reservas.jsx"></script>
<script type="text/babel" src="screen-pagos.jsx"></script>
<script type="text/babel" src="screen-marketing.jsx"></script>
<script type="text/babel" src="screen-crm.jsx"></script>
<script type="text/babel" src="screen-detail.jsx"></script>
<script type="text/babel" src="screen-asistencia.jsx"></script>
<script type="text/babel" src="screen-ajustes.jsx"></script>
<script type="text/babel" src="forms.jsx"></script>
<script type="text/babel" src="forms-sheets.jsx"></script>
<script type="text/babel" src="store.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script type="text/babel">
  const Root = () => (
    <IOSDevice width={402} height={874}>
      <App />
    </IOSDevice>
  );
  ReactDOM.createRoot(document.getElementById('root')).render(<Root />);

  // Fit-to-viewport (mobile-first scaling)
  function fitDevice() {
    const root = document.getElementById('root');
    if (!root) return;
    const pad = 24;
    const sw = (window.innerWidth - pad) / 402;
    const sh = (window.innerHeight - pad) / 874;
    const scale = Math.min(sw, sh, 1.4);
    root.style.transform = 'scale(' + scale + ')';
  }
  window.addEventListener('resize', fitDevice);
  setTimeout(fitDevice, 50);
  setTimeout(fitDevice, 400);
  setTimeout(fitDevice, 1200);
</script>

</body>
</html>
